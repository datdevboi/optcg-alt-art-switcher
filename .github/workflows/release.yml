name: Release unsigned macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macos-15 includes Xcode/Swift 6, required by this package.
    runs-on: macos-15
    env:
      APP_NAME: OPTCG Alt Art Switcher
      ARCHS: arm64 x86_64
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate core behavior
        run: swift run AltArtCoreValidation

      - name: Build universal app
        run: scripts/build-app.sh

      - name: Package and verify release
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "release/$APP_NAME-${VERSION}.zip"
          scripts/verify-release.sh "dist/$APP_NAME.app" "release/$APP_NAME-${VERSION}.zip"
          shasum -a 256 "release/$APP_NAME-${VERSION}.zip" > "release/$APP_NAME-${VERSION}.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Installation

            This is an unsigned macOS app. After moving it to Applications, try to open it once. Then go to **System Settings → Privacy & Security** and choose **Open Anyway**. You only need to do this once.

            Verify the ZIP with the included SHA-256 checksum if desired.
          generate_release_notes: true
          files: release/*
