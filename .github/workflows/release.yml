name: Release macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      APP_NAME: OPTCG Alt Art Switcher
      ARCHS: arm64 x86_64
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate core behavior
        run: swift run AltArtCoreValidation

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build and sign universal app
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: scripts/build-app.sh

      - name: Create notarization archive
        run: ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "$RUNNER_TEMP/$APP_NAME.zip"

      - name: Notarize and staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME.zip" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "dist/$APP_NAME.app"
          xcrun stapler validate "dist/$APP_NAME.app"

      - name: Package and verify release
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME.app" "release/$APP_NAME-${VERSION}.zip"
          scripts/verify-release.sh "dist/$APP_NAME.app" "release/$APP_NAME-${VERSION}.zip"
          shasum -a 256 "release/$APP_NAME-${VERSION}.zip" > "release/$APP_NAME-${VERSION}.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
